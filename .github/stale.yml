# عدد أيام عدم النشاط قبل اعتبار التذكرة "راكدة"
daysUntilStale: 15 # تقنية مضافة: تقليل المدة من 60 إلى 15 يوماً للحفاظ على حيوية البروتوكول

# عدد الأيام قبل إغلاق التذكرة بعد وسمها كـ Stale
daysUntilClose: 7 # حل مشكلة البطء: الإغلاق بعد أسبوع واحد فقط بدلاً من المدد الطويلة

# الوسم الذي سيتم وضعه
staleLabel: "AST: Inactive"

# استثناءات أمنية وحيوية (Critical Exemptions)
exemptLabels:
  - "Security"        # لا يتم إغلاق أي ثغرة أمنية آلياً لضمان سلامة AST
  - "Core-Protocol"   # الحفاظ على نقاشات النواة مفتوحة دائماً
  - "High-Priority"   # المهام العاجلة للمهندس أوسان
  - "Pinned"

# رسالة الوسم (محدثة ببياناتك)
markComment: >
  مرحباً، تم اعتبار هذه التذكرة "راكدة" لعدم وجود نشاط مؤخراً في مستودع **AST Protocol**.
  للحفاظ على جودة الكود وسرعة الإنجاز، سيتم إغلاقها قريباً.
  إذا كان هذا الموضوع لا يزال حيوياً، يرجى إضافة تعليق.
  تحياتنا، فريق تطوير المهندس أوسان سلطان.

# رسالة الإغلاق النهائي
closeComment: >
  تم إغلاق هذه التذكرة نظراً لعدم النشاط. شكراً لمساهمتكم في **Awsan Sultan Token Protocol**.
  يمكنكم دائماً إعادة فتحها إذا توفرت مستجدات.
