# ==============================================================================
# AST PROTOCOL (AWSAN SULTAN TOKEN PROTOCOL) - DOCKER VIRTUALIZATION
# OWNER: ENG. AWSAN ADEL ABDULBARI AHMED SULTAN | YEMEN
# ==============================================================================
# UPDATED FROM BSC: Multi-Arch Support (AMD64/ARM64) & Intellectual Property Tags.
# ==============================================================================

name: AST Protocol Docker Release

on:
  push:
    tags:
      - 'v*' # التفعيل عند دفع وسوم الإصدارات مثل v1.0.0

env:
  REGISTRY: ghcr.io
  # تحديث تقني: تسمية الحاوية باسم البروتوكول الخاص بك
  REGISTRY_IMAGE: awsan-sultan/ast-protocol 

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform_pair: linux-amd64
          - os: ubuntu-24.04-arm
            platform_pair: linux-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
      id-token: write # تقنية مضافة: لضمان أمان الـ Provenance

    steps:
      - name: Checkout AST Source
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Docker Meta (AST Identity)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}
          # إضافة بيانات الملكية الفكرية كملصقات داخل الصورة (Metadata)
          labels: |
            org.opencontainers.image.title=AST Protocol
            org.opencontainers.image.description=Awsan Sultan Token Protocol Core
            org.opencontainers.image.vendor=ENG. AWSAN ADEL ABDULBARI
            org.opencontainers.image.licenses=GPL-3.0
            org.opencontainers.image.authors=AWSAN.SULTAN@GMAIL.COM

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v6
        with:
          # تحسين تقني: بناء النسخة لبروتوكول AST مع تفعيل خاصية الـ Attestations
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true # تقنية مضافة: توليد قائمة مكونات البرمجيات للأمان

      - name: Export Digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload Digest Artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_pair | replace('/', '-') }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Download All Digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Multi-Arch Manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}:${{ github.ref_name }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }:latest \
            $(printf '${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect Final AST Image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}:${{ github.ref_name }}
